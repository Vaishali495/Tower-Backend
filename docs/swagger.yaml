# Notification routes
  /api/notification:
    get:
      summary: Get all notifications for logged-in user
      tags:
        - Notification

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: page
          description: Page number (default = 1)

          schema:
            type: integer
            example: 1

        - in: query
          name: limit
          description: Number of records per page (max = 50)

          schema:
            type: integer
            example: 10

      responses:
        200:
          description: Notifications fetched successfully
          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Notifications fetched successfully

                  data:
                    type: array

                    items:
                      type: object

                      properties:
                        _id:
                          type: string
                          example: 664f1c2a9c1234567890abcd

                        message:
                          type: string
                          example: New post: Water issue fixed

                        status:
                          type: string
                          example: UNREAD

                        type:
                          type: string
                          example: POST

                        referenceId:
                          type: object

                          properties:
                            _id:
                              type: string
                              example: 664f1c2a9c1234567890efgh

                            title:
                              type: string
                              example: Water issue fixed

                            description:
                              type: string
                              example: Issue resolved in sector 5

                            image:
                              type: array

                              items:
                                type: string
                                example: https://example.com/image.jpg

                        createdBy:
                          type: object

                          properties:
                            _id:
                              type: string
                              example: 664f1c2a9c1234567890user

                            name:
                              type: string
                              example: Admin User

                            email:
                              type: string
                              example: admin@example.com

                        createdAt:
                          type: string
                          example: 2026-05-05T10:00:00.000Z

                  pagination:
                    type: object

                    properties:
                      total:
                        type: integer
                        example: 45

                      page:
                        type: integer
                        example: 1

                      limit:
                        type: integer
                        example: 10

                      totalPages:
                        type: integer
                        example: 5

                  meta:
                    type: object

                    properties:
                      unreadCount:
                        type: integer
                        example: 12

        401:
          description: Unauthorized (invalid or missing token)

        500:
          description: Failed to fetch notifications

    delete:
      summary: Delete notification(s) for logged-in user
      tags:
        - Notification

      security:
        - bearerAuth: []

      description: |
        Delete notifications of the authenticated user.

        - Pass `deleteAll: true` to remove all notifications.
        - Or pass `notificationIds` array to delete specific notifications.
        - If some IDs do not exist or do not belong to the user, they will be returned in `missingIds`.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

              properties:
                notificationIds:
                  type: array
                  description: Array of notification IDs to delete

                  items:
                    type: string

                  example:
                    - 664f1c2a9c1234567890abcd
                    - 664f1c2a9c1234567890efgh

                deleteAll:
                  type: boolean
                  example: false
                  description: Set true to delete all notifications of the user

      responses:
        200:
          description: Notification(s) deleted successfully
          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Notification(s) deleted successfully

                  deletedCount:
                    type: integer
                    example: 2

                  missingIds:
                    type: array
                    description: IDs that were not found or not owned by the user

                    items:
                      type: string

                    example:
                      - invalidId123

        400:
          description: Invalid request body

        401:
          description: Unauthorized (invalid or missing token)

        500:
          description: Failed to delete notifications

  /api/notification/read-all:
    patch:
      summary: Mark all notifications as read
      description: Marks all unread notifications of the logged-in user as READ and sets the read timestamp.
      tags:
        - Notification

      security:
        - bearerAuth: []

      responses:
        200:
          description: Notifications processed successfully
          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: All unread notifications marked as read

                  modifiedCount:
                    type: integer
                    example: 5

        401:
          description: Unauthorized - Token missing or invalid

        500:
          description: Internal server error